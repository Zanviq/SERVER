services:
  backend:
    build: ./backend
    container_name: twomes-backend
    restart: unless-stopped
    expose:
      - "8000"
    ports:
      - "8000:8000" # 로컬/LAN 직접 접근용 (원하면 제거)
    # .env 전체를 전달 (AUTH_USERS/SESSION_SECRET/<id>_GOOGLE_* 등 동적 키 포함).
    # environment가 env_file보다 우선하므로, 백엔드에 불필요한 값은 여기서 덮어 제거.
    env_file:
      - .env
    environment:
      # 컨테이너 내부 저장소 경로는 항상 마운트 지점으로 고정
      STORAGE_ROOT: /mnt/hdd
      # 터널 토큰은 cloudflared 서비스만 사용 → 백엔드엔 노출하지 않음(최소권한)
      CF_TUNNEL_TOKEN: ""
    volumes:
      - /mnt/hdd:/mnt/hdd

  frontend:
    build: ./frontend
    container_name: twomes-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  # 4단계: 포트포워딩 없이 외부 접속 (Cloudflare Tunnel)
  # 사용하려면: 대시보드에서 터널 생성 후 토큰을 .env의 CF_TUNNEL_TOKEN에 넣고
  #   docker compose --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: twomes-tunnel
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - frontend
